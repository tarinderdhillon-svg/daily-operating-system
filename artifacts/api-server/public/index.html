<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Operating System</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📅 Daily Operating System</h1>
            <p>Your personal dashboard</p>
        </header>

        <nav class="nav">
            <button class="nav-btn active" data-tab="dashboard">Dashboard</button>
            <button class="nav-btn" data-tab="tasks">Tasks</button>
            <button class="nav-btn" data-tab="projects">Projects</button>
            <button class="nav-btn" data-tab="calendar">Calendar</button>
            <button class="nav-btn" data-tab="chat">Chat</button>
            <button class="nav-btn" data-tab="learning">Learning</button>
        </nav>

        <!-- Dashboard Tab -->
        <section id="dashboard" class="tab-content active">
            <div class="dashboard-grid">
                <div class="card">
                    <h2>📊 Quick Stats</h2>
                    <div id="stats-content">Loading...</div>
                </div>
                <div class="card">
                    <h2>⏰ Quick Actions</h2>
                    <button class="btn btn-primary" onclick="switchTab('tasks')">Manage Tasks</button>
                    <button class="btn btn-secondary" onclick="switchTab('chat')">Start Chat</button>
                </div>
            </div>
        </section>

        <!-- Tasks Tab -->
        <section id="tasks" class="tab-content">
            <div class="card">
                <h2>📝 Tasks</h2>
                <div class="task-input">
                    <input type="text" id="taskInput" placeholder="Add a new task...">
                    <button class="btn btn-primary" onclick="addTask()">Add Task</button>
                </div>
                <div id="tasks-list">Loading tasks...</div>
            </div>
        </section>

        <!-- Projects Tab -->
        <section id="projects" class="tab-content">
            <div class="card">
                <h2>🎯 Projects</h2>
                <div id="projects-list">Loading projects...</div>
            </div>
        </section>

        <!-- Calendar Tab -->
        <section id="calendar" class="tab-content">
            <div class="card">
                <h2>📅 Calendar</h2>
                <div id="calendar-content">Loading calendar...</div>
            </div>
        </section>

        <!-- Chat Tab -->
        <section id="chat" class="tab-content">
            <div class="card">
                <h2>💬 Chat</h2>
                <div id="chat-messages" class="chat-messages">Loading...</div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Ask me anything...">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </section>

        <!-- Learning Tab -->
        <section id="learning" class="tab-content">
            <div class="card">
                <h2>📚 Daily Learning</h2>
                <div id="learning-content">Loading today's lesson...</div>
            </div>
        </section>
    </div>

    <script src="/script.js"></script>
</body>
</html>
